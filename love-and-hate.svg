<svg xmlns="http://www.w3.org/2000/svg" width="840" height="420" viewBox="0 0 840 420">
  <defs>
    <radialGradient id="redGlow" cx="50%" cy="18%" r="52%">
      <stop offset="0%" stop-color="#d71920" stop-opacity="0.34"/>
      <stop offset="32%" stop-color="#d71920" stop-opacity="0.24"/>
      <stop offset="56%" stop-color="#d71920" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d71920" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="haloMaskGradient" cx="50%" cy="18%" r="58%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="32%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="52%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="78%" stop-color="white" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <mask id="haloMask">
      <rect width="840" height="420" fill="url(#haloMaskGradient)"/>
    </mask>

    <filter id="softGrain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.62" numOctaves="3" seed="17" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.2"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="840" height="420" fill="#ffffff"/>

  <circle cx="420" cy="82" r="148" fill="#d71920">
    <animate attributeName="r" values="147;150;147" dur="6.5s" repeatCount="indefinite"/>
  </circle>

  <rect width="840" height="420" fill="url(#redGlow)" opacity="0.95"/>

  <rect width="840" height="420" fill="#d71920" filter="url(#softGrain)" mask="url(#haloMask)" opacity="0.9">
    <animate attributeName="opacity" values="0.68;0.92;0.76;0.86;0.68" dur="4.8s" repeatCount="indefinite"/>
  </rect>

  <text x="420" y="322"
    text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="42"
    font-weight="800"
    letter-spacing="2"
    fill="#111111">LOVE AND HATE</text>

  <rect x="18" y="18" width="804" height="384" rx="24"
    fill="none"
    stroke="#111111"
    stroke-opacity="0.18"
    stroke-width="2"/>
</svg>
