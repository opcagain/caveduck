<svg xmlns="http://www.w3.org/2000/svg" width="840" height="420" viewBox="0 0 840 420">
  <defs>
    <linearGradient id="light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#e9e9e9"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </linearGradient>

    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" seed="8"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.18"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="840" height="420" fill="url(#light)"/>
  <rect width="840" height="420" filter="url(#grain)" opacity="0.45"/>

  <rect x="24" y="24" width="792" height="372" rx="22" fill="none" stroke="#111" stroke-width="2"/>
  <text x="420" y="190" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="800" letter-spacing="10" fill="#111">LOVE</text>
  <text x="420" y="260" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="800" letter-spacing="8" fill="#111">AND HATE</text>
</svg>
