<svg xmlns="http://www.w3.org/2000/svg" width="840" height="420" viewBox="0 0 840 420">
  <defs>
    <radialGradient id="redHalo" cx="50%" cy="18%" r="48%">
      <stop offset="0%" stop-color="#d71920" stop-opacity="0.55"/>
      <stop offset="34%" stop-color="#d71920" stop-opacity="0.28"/>
      <stop offset="58%" stop-color="#d71920" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d71920" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="grainMask" cx="50%" cy="18%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="34%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="58%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="4" seed="21"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.28"/>
      </feComponentTransfer>
    </filter>

    <mask id="haloGrainMask">
      <rect width="840" height="420" fill="url(#grainMask)"/>
    </mask>
  </defs>

  <rect width="840" height="420" fill="#f7f1e6"/>

  <circle cx="420" cy="78" r="152" fill="#d71920">
    <animate attributeName="r" values="150;154;150" dur="5.5s" repeatCount="indefinite"/>
  </circle>

  <rect width="840" height="420" fill="url(#redHalo)"/>

  <rect width="840" height="420" filter="url(#grain)" mask="url(#haloGrainMask)" opacity="0.75">
    <animate attributeName="opacity" values="0.48;0.78;0.55;0.75;0.48" dur="3.8s" repeatCount="indefinite"/>
  </rect>

  <rect x="20" y="20" width="800" height="380" rx="22"
        fill="none" stroke="#111111" stroke-opacity="0.32" stroke-width="2"/>

  <text x="420" y="300"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="54"
        font-weight="800"
        letter-spacing="12"
        fill="#111111">LOVE</text>

  <text x="420" y="356"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="34"
        font-weight="800"
        letter-spacing="9"
        fill="#111111">AND HATE</text>
</svg>
